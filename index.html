<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Compressorfiore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "JetBrains Mono", monospace;
        background: #040404;
        color: #f0f0f0;
        padding: 28px 32px;
        user-select: none;
        min-height: 100vh;
        max-width: 840px;
        margin: auto;
      }

      .version {
        position: fixed;
        top: 8px;
        left: 12px;
        font-size: 9px;
        font-weight: 600;
        color: #3a3a3a;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        pointer-events: none;
      }

      .encoder-badge {
        position: fixed;
        top: 8px;
        right: 12px;
        font-size: 9px;
        font-weight: 600;
        color: #3a3a3a;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        pointer-events: none;
      }

      .encoder-badge.gpu {
        color: #4a6a3a;
      }

      .lang-toggle {
        position: fixed;
        bottom: 10px;
        left: 12px;
        display: flex;
        gap: 6px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        z-index: 50;
      }

      .lang-toggle button {
        font-family: "JetBrains Mono", monospace;
        background: none;
        border: none;
        color: #3a3a3a;
        cursor: pointer;
        padding: 2px 4px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: color 0.15s;
      }

      .lang-toggle button:hover {
        color: #888;
      }

      .lang-toggle button.active {
        color: #f8f6f0;
      }

      .lang-toggle .sep {
        color: #2a2a2a;
      }

      .header-title {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #f8f6f0;
        text-align: center;
      }

      .header-subheading {
        font-size: 0.75rem;
        color: #666;
        font-weight: 600;
      }

      /* Zone settings (inline controls inside drop zones) */
      .zone-settings {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 8px;
      }

      .zone-setting {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #999;
      }

      .zone-setting input[type="number"] {
        font-family: "JetBrains Mono", monospace;
        width: 52px;
        padding: 4px 6px;
        border-radius: 6px;
        border: 2px solid #333;
        background: #0a0a0a;
        color: #f8f6f0;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }

      .zone-setting input[type="number"]:focus {
        outline: none;
        border-color: #eb6f46;
      }

      /* Toggle switch */
      .toggle {
        position: relative;
        width: 32px;
        height: 18px;
        flex-shrink: 0;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle .slider {
        position: absolute;
        inset: 0;
        background: #333;
        border-radius: 9px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle .slider::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 2px;
        top: 2px;
        background: #666;
        border-radius: 50%;
        transition:
          transform 0.2s,
          background 0.2s;
      }

      .toggle input:checked + .slider {
        background: #eb6f46;
      }

      .toggle input:checked + .slider::before {
        transform: translateX(14px);
        background: #f8f6f0;
      }

      /* Drop zones container */
      .zones {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      .drop-zone {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 32px 20px;
        border: 2px dashed #222;
        border-radius: 14px;
        text-align: center;
        cursor: pointer;
        transition: all 150ms ease;
        min-height: 160px;
        background: #0a0a0a;
      }

      .drop-zone:hover {
        border-color: #444;
        background: #111;
      }

      .drop-zone.dragover {
        border-color: #eb6f46;
        background: rgba(235, 111, 70, 0.06);
      }

      .drop-zone.heavy:hover,
      .drop-zone.heavy.dragover {
        border-color: #eb6f46;
        background: rgba(235, 111, 70, 0.08);
      }

      .drop-zone.standard:hover,
      .drop-zone.standard.dragover {
        border-color: #f8f6f0;
        background: rgba(248, 246, 240, 0.04);
      }

      .drop-zone .icon {
        font-size: 28px;
        opacity: 0.6;
      }

      .drop-zone .title {
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .drop-zone .desc {
        font-size: 11px;
        font-weight: 500;
        color: #666;
        max-width: 220px;
        line-height: 1.5;
      }

      .drop-zone.heavy .title {
        color: #eb6f46;
      }
      .drop-zone.standard .title {
        color: #f8f6f0;
      }

      /* Queue */
      .queue-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .queue-section h2 {
        font-size: 12px;
        font-weight: 800;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 0;
      }

      .clear-all-btn {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #555;
        background: none;
        border: 1px solid #222;
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      .clear-all-btn:hover {
        color: #eb6f46;
        border-color: #eb6f46;
      }

      .queue {
        display: flex;
        flex-direction: column-reverse;
        gap: 6px;
      }

      .queue:empty::after {
        content: var(
          --queue-empty,
          "No jobs in queue. Drag'n'Drop Videos or Folders above to start."
        );
        color: #333;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        text-align: center;
        padding: 24px;
      }

      .job-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .cancel-btn {
        background: none;
        border: 1px solid #333;
        border-radius: 5px;
        color: #555;
        cursor: pointer;
        font-size: 10px;
        font-weight: 800;
        line-height: 1;
        padding: 3px 7px;
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      .cancel-btn:hover {
        color: #eb6f46;
        border-color: #eb6f46;
      }

      .job .status.cancelled {
        color: #555;
      }

      .job {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: #0f0f0f;
        border: 2px solid #1a1a1a;
        border-radius: 10px;
        font-size: 12px;
        border-left: 4px solid #333;
      }

      .job.heavy {
        border-left-color: #eb6f46;
      }
      .job.standard {
        border-left-color: #f8f6f0;
      }
      .job.whatsapp {
        border-left-color: #28d366;
      }
      .job.whatsapp .badge {
        background: rgba(40, 211, 102, 0.15);
        color: #28d366;
      }

      /* WhatsApp Ready strip */
      .drop-zone.whatsapp {
        flex-direction: row;
        justify-content: space-between;
        gap: 16px;
        min-height: 0;
        padding: 18px 22px;
        margin-bottom: 16px;
        border-color: #1f3a2a;
        background: #0a0a0a;
      }
      .drop-zone.whatsapp:hover,
      .drop-zone.whatsapp.dragover {
        border-color: #28d366;
        background: rgba(40, 211, 102, 0.06);
      }
      .drop-zone.whatsapp .wa-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .drop-zone.whatsapp .wa-left svg {
        display: block;
        flex-shrink: 0;
      }
      .drop-zone.whatsapp .title {
        color: #28d366;
        font-size: 13px;
      }
      .drop-zone.whatsapp .wa-controls {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .wa-select {
        font-family: "JetBrains Mono", monospace;
        background: #0a0a0a;
        color: #f8f6f0;
        border: 2px solid #333;
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        cursor: pointer;
      }

      .wa-select:focus {
        outline: none;
        border-color: #28d366;
      }

      .wa-audio {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 12px;
      }

      .wa-audio label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #999;
      }
      .drop-zone.whatsapp .toggle input:checked + .slider {
        background: #28d366;
      }

      .job .badge {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 3px 8px;
        border-radius: 6px;
        white-space: nowrap;
      }

      .job.heavy .badge {
        background: rgba(235, 111, 70, 0.15);
        color: #eb6f46;
      }

      .job.standard .badge {
        background: rgba(248, 246, 240, 0.1);
        color: #f8f6f0;
      }

      .job .filename {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 600;
        cursor: pointer;
        transition: color 0.15s;
      }

      .job .filename:hover {
        color: #eb6f46;
        text-decoration: underline;
      }

      .job .status {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #555;
        white-space: nowrap;
      }

      .job .status.processing {
        color: #ffb400;
      }
      .job .status.done {
        color: #4caf50;
      }
      .job .status.error {
        color: #eb6f46;
      }

      /* Progress bar */
      .progress-bar {
        grid-column: 1 / -1;
        height: 3px;
        background: #1a1a1a;
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
      }

      .progress-bar .fill {
        height: 100%;
        background: #ffb400;
        border-radius: 2px;
        transition: width 0.3s ease;
        width: 0%;
      }

      .job.done .progress-bar .fill {
        background: #4caf50;
        width: 100%;
      }

      /* Update banner */
      .update-banner {
        position: fixed;
        bottom: 16px;
        right: 16px;
        display: none;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: #0f1f12;
        border: 2px solid #28d366;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #28d366;
        z-index: 100;
      }
      .update-banner.show {
        display: flex;
      }
      .update-banner button {
        font-family: "JetBrains Mono", monospace;
        background: #28d366;
        color: #04140a;
        border: none;
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="version" id="version"></div>
    <div class="encoder-badge" id="encoderBadge"></div>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button type="button" data-lang="en">EN</button>
      <span class="sep">·</span>
      <button type="button" data-lang="pt-BR">PT-BR</button>
    </div>
    <div class="update-banner" id="updateBanner">
      <span id="updateBannerText" data-i18n="update.available"
        >New version available</span
      >
      <button id="updateBannerBtn" data-i18n="update.download">Download</button>
    </div>
    <div class="header-title">
      <h1>CompressorFiore</h1>
      <span class="header-subheading" data-i18n="header.subheading"
        >Drag'n'Drop Videos or Folders in any area below to get started.</span
      >
    </div>

    <div class="zones">
      <div
        class="drop-zone standard"
        id="zoneStandard"
        role="button"
        tabindex="0"
        data-i18n-attr="aria-label:zone.standard.aria"
        aria-label="Drop videos here for standard web compression"
      >
        <div class="icon">&#x1F4E6;</div>
        <div class="title" data-i18n="zone.standard.title">
          Standard Compression
        </div>
        <div class="desc" data-i18n="zone.standard.desc" data-i18n-html="1">
          Web-optimized. <br />Drag'n'Drop Videos or Folders.
        </div>
        <div class="zone-settings" onclick="event.stopPropagation()">
          <div class="zone-setting">
            <label for="standardThumb" data-i18n="setting.thumb">Thumb</label>
            <label class="toggle">
              <input type="checkbox" id="standardThumb" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
      <div
        class="drop-zone heavy"
        id="zoneHeavy"
        role="button"
        tabindex="0"
        data-i18n-attr="aria-label:zone.heavy.aria"
        aria-label="Drop videos here for heavy compression"
      >
        <div class="icon">&#x1F525;</div>
        <div class="title" data-i18n="zone.heavy.title">
          Heavy Compression [2MB Max]
        </div>
        <div class="desc" data-i18n="zone.heavy.desc">
          Drag'n'Drop Videos or Folders.
        </div>
        <div class="zone-settings" onclick="event.stopPropagation()">
          <div class="zone-setting">
            <label for="maxDuration" data-i18n="setting.clip">Clip</label>
            <input
              type="number"
              id="maxDuration"
              value="6"
              min="1"
              max="120"
              data-i18n-attr="aria-label:setting.clip.aria"
              aria-label="Clip duration in seconds"
            />
            <span data-i18n="setting.sec">sec</span>
          </div>
          <div class="zone-setting">
            <label for="heavyAudio" data-i18n="setting.audio">Audio</label>
            <label class="toggle" style="margin-right: 10px">
              <input type="checkbox" id="heavyAudio" checked />
              <span class="slider"></span>
            </label>
            <label for="heavyThumb" data-i18n="setting.thumb">Thumb</label>
            <label class="toggle">
              <input type="checkbox" id="heavyThumb" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div
      class="drop-zone whatsapp"
      id="zoneWhatsapp"
      role="button"
      tabindex="0"
      data-i18n-attr="aria-label:zone.whatsapp.aria"
      aria-label="Drop videos here for WhatsApp-ready compression"
    >
      <div class="wa-left">
        <svg
          width="22"
          height="22"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M16.9491 2.89692C15.0843 1.02974 12.6041 0.000947325 9.96159 0C4.51637 0 0.0847856 4.43112 0.0828909 9.87776C0.0819435 11.6189 0.537134 13.3184 1.40157 14.8162L0 19.9355L5.23681 18.5619C6.67958 19.3491 8.30424 19.7636 9.95734 19.7641H9.96159C15.4059 19.7641 19.838 15.3325 19.8398 9.88581C19.8408 7.24612 18.8143 4.76458 16.9491 2.89739V2.89692ZM9.96159 18.0958H9.95828C8.48517 18.0954 7.04006 17.6993 5.77918 16.9514L5.47934 16.7734L2.37163 17.5885L3.20102 14.5585L3.00586 14.2478C2.18406 12.9405 1.74971 11.4295 1.75066 9.87826C1.75255 5.35144 5.43575 1.66824 9.96495 1.66824C12.158 1.66919 14.2194 2.52415 15.7696 4.07634C17.32 5.62807 18.173 7.69136 18.1721 9.88487C18.1702 14.4122 14.487 18.0954 9.96159 18.0954V18.0958ZM14.4652 11.9467C14.2184 11.8231 13.0049 11.2263 12.7785 11.1439C12.5521 11.0614 12.3877 11.0203 12.2233 11.2675C12.059 11.5148 11.5858 12.0708 11.4418 12.2352C11.2978 12.4 11.1538 12.4204 10.907 12.2967C10.6603 12.1731 9.86498 11.9126 8.92192 11.0718C8.18823 10.4172 7.69273 9.60921 7.54879 9.36193C7.40478 9.1147 7.53363 8.98111 7.65675 8.85843C7.76757 8.74761 7.90353 8.56999 8.02715 8.42598C8.15081 8.28198 8.19154 8.17875 8.27393 8.01436C8.35638 7.84952 8.31515 7.70557 8.2536 7.58191C8.19198 7.45829 7.69847 6.24332 7.49241 5.74931C7.29202 5.26808 7.08839 5.33345 6.93728 5.32539C6.79327 5.31828 6.62893 5.31687 6.4641 5.31687C6.29926 5.31687 6.03208 5.37844 5.80569 5.6257C5.57929 5.87292 4.94172 6.47021 4.94172 7.68469C4.94172 8.89916 5.82608 10.0734 5.94969 10.2382C6.07331 10.4031 7.69036 12.896 10.1662 13.9655C10.755 14.2198 11.2149 14.3719 11.5735 14.4856C12.1646 14.6736 12.7027 14.6471 13.128 14.5836C13.6022 14.5126 14.5883 13.9863 14.7939 13.4099C14.9995 12.8334 14.9995 12.3389 14.9379 12.2361C14.8764 12.1333 14.7115 12.0713 14.4647 11.9477L14.4652 11.9467Z"
            fill="#28D366"
          />
        </svg>
        <div class="title" data-i18n="zone.whatsapp.title">
          WhatsApp-Ready Compression
        </div>
      </div>
      <div class="wa-controls" onclick="event.stopPropagation()">
        <select
          id="whatsappRes"
          class="wa-select"
          data-i18n-attr="aria-label:zone.whatsapp.resAria"
          aria-label="Max resolution"
        >
          <option value="1080">1080p</option>
          <option value="720">720p</option>
        </select>
        <div class="wa-audio">
          <label for="whatsappAudio" data-i18n="setting.audio">Audio</label>
          <label class="toggle">
            <input type="checkbox" id="whatsappAudio" checked />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="queue-section">
      <div class="queue-header">
        <h2 data-i18n="queue.title">Queue</h2>
        <button
          class="clear-all-btn"
          id="clearAllBtn"
          onclick="clearQueue()"
          data-i18n="queue.clearAll"
        >
          Clear All
        </button>
      </div>
      <div class="queue" id="queue" role="list" aria-live="polite"></div>
    </div>

    <script>
      const translations = {
        en: {
          "header.subheading":
            "Drag'n'Drop Videos or Folders in any area below to get started.",
          "zone.standard.title": "Standard Compression",
          "zone.standard.desc":
            "Web-optimized. <br />Drag'n'Drop Videos or Folders.",
          "zone.standard.aria": "Drop videos here for standard web compression",
          "zone.heavy.title": "Heavy Compression [2MB Max]",
          "zone.heavy.desc": "Drag'n'Drop Videos or Folders.",
          "zone.heavy.aria": "Drop videos here for heavy compression",
          "zone.whatsapp.title": "WhatsApp-Ready Compression",
          "zone.whatsapp.aria":
            "Drop videos here for WhatsApp-ready compression",
          "zone.whatsapp.resAria": "Max resolution",
          "setting.thumb": "Thumb",
          "setting.audio": "Audio",
          "setting.clip": "Clip",
          "setting.sec": "sec",
          "setting.clip.aria": "Clip duration in seconds",
          "queue.title": "Queue",
          "queue.clearAll": "Clear All",
          "queue.empty":
            "No jobs in queue. Drag'n'Drop Videos or Folders above to start.",
          "badge.heavy": "Heavy",
          "badge.standard": "Standard",
          "badge.whatsapp": "WhatsApp",
          "status.waiting": "Waiting...",
          "status.done": "Done",
          "status.error": "Error",
          "status.cancelled": "Cancelled",
          "reveal.win": "Click to reveal in Explorer",
          "reveal.mac": "Click to reveal in Finder",
          "cancel.aria": "Cancel job",
          "update.available": "New version available",
          "update.versionAvailable": "v{version} available",
          "update.download": "Download",
          "update.ready": "Update ready",
          "update.restart": "Restart",
        },
        "pt-BR": {
          "header.subheading":
            "Arraste e solte vídeos ou pastas em qualquer área abaixo para começar.",
          "zone.standard.title": "Compressão Padrão",
          "zone.standard.desc":
            "Otimizada para web. <br />Arraste e solte vídeos ou pastas.",
          "zone.standard.aria": "Solte vídeos aqui para compressão web padrão",
          "zone.heavy.title": "Compressão Pesada [Máx. 2MB]",
          "zone.heavy.desc": "Arraste e solte vídeos ou pastas.",
          "zone.heavy.aria": "Solte vídeos aqui para compressão pesada",
          "zone.whatsapp.title": "Compressão Pronta para WhatsApp",
          "zone.whatsapp.aria":
            "Solte vídeos aqui para compressão pronta para WhatsApp",
          "zone.whatsapp.resAria": "Resolução máxima",
          "setting.thumb": "Capa",
          "setting.audio": "Áudio",
          "setting.clip": "Corte",
          "setting.sec": "seg",
          "setting.clip.aria": "Duração do corte em segundos",
          "queue.title": "Fila",
          "queue.clearAll": "Limpar Tudo",
          "queue.empty":
            "Nenhum job na fila. Arraste e solte vídeos ou pastas acima para começar.",
          "badge.heavy": "Pesada",
          "badge.standard": "Padrão",
          "badge.whatsapp": "WhatsApp",
          "status.waiting": "Aguardando...",
          "status.done": "Concluído",
          "status.error": "Erro",
          "status.cancelled": "Cancelado",
          "reveal.win": "Clique para abrir no Explorer",
          "reveal.mac": "Clique para abrir no Finder",
          "cancel.aria": "Cancelar job",
          "update.available": "Nova versão disponível",
          "update.versionAvailable": "v{version} disponível",
          "update.download": "Baixar",
          "update.ready": "Atualização pronta",
          "update.restart": "Reiniciar",
        },
      };

      let currentLang =
        localStorage.getItem("lang") ||
        (navigator.language?.startsWith("pt") ? "pt-BR" : "en");
      if (!translations[currentLang]) currentLang = "en";

      function t(key, vars) {
        let s = translations[currentLang][key] ?? translations.en[key] ?? key;
        if (vars) for (const k in vars) s = s.replace(`{${k}}`, vars[k]);
        return s;
      }

      function applyI18n() {
        document.documentElement.lang = currentLang;
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          const vars = {};
          for (const { name, value } of el.attributes) {
            if (
              name.startsWith("data-i18n-") &&
              name !== "data-i18n-html" &&
              name !== "data-i18n-attr"
            ) {
              vars[name.slice("data-i18n-".length)] = value;
            }
          }
          const val = t(key, vars);
          if (el.getAttribute("data-i18n-html")) el.innerHTML = val;
          else el.textContent = val;
        });
        document.querySelectorAll("[data-i18n-attr]").forEach((el) => {
          el.getAttribute("data-i18n-attr")
            .split(",")
            .forEach((pair) => {
              const [attr, key] = pair.trim().split(":");
              if (attr && key) el.setAttribute(attr, t(key));
            });
        });
        document.documentElement.style.setProperty(
          "--queue-empty",
          JSON.stringify(t("queue.empty")),
        );
        document.querySelectorAll(".lang-toggle button").forEach((b) => {
          b.classList.toggle("active", b.dataset.lang === currentLang);
        });
      }

      function setLang(lang) {
        if (!translations[lang] || lang === currentLang) return;
        currentLang = lang;
        localStorage.setItem("lang", lang);
        applyI18n();
        if (typeof renderQueue === "function") renderQueue();
      }

      document.querySelectorAll(".lang-toggle button").forEach((b) => {
        b.addEventListener("click", () => setLang(b.dataset.lang));
      });
      applyI18n();

      const queue = [];
      let processing = false;
      let jobCounter = 0;

      const queueEl = document.getElementById("queue");
      const maxDurationInput = document.getElementById("maxDuration");

      if (window.api?.appVersion) {
        document.getElementById("version").textContent =
          `v${window.api.appVersion}`;
      }

      window.api.getEncoder?.().then((encoder) => {
        const badge = document.getElementById("encoderBadge");
        if (!badge || !encoder) return;
        const label =
          encoder === "libx264"
            ? "CPU · x264"
            : `GPU · ${encoder.replace(/^h264_/, "")}`;
        badge.textContent = label;
        if (encoder !== "libx264") badge.classList.add("gpu");
      });

      // macOS: link to release page (can't auto-install without signing)
      window.api.onUpdateAvailable(({ version, url }) => {
        const textEl = document.getElementById("updateBannerText");
        textEl.textContent = t("update.versionAvailable", { version });
        textEl.setAttribute("data-i18n", "update.versionAvailable");
        textEl.dataset.i18nVersion = version;
        const btn = document.getElementById("updateBannerBtn");
        btn.textContent = t("update.download");
        btn.setAttribute("data-i18n", "update.download");
        btn.onclick = () => window.api.openExternal(url);
        document.getElementById("updateBanner").classList.add("show");
      });

      // Windows: update downloaded in background, just needs restart
      window.api.onUpdateReadyInstall(() => {
        const textEl = document.getElementById("updateBannerText");
        textEl.textContent = t("update.ready");
        textEl.setAttribute("data-i18n", "update.ready");
        const btn = document.getElementById("updateBannerBtn");
        btn.textContent = t("update.restart");
        btn.setAttribute("data-i18n", "update.restart");
        btn.onclick = () => window.api.installUpdate();
        document.getElementById("updateBanner").classList.add("show");
      });

      // Listen for progress updates from main process
      window.api.onJobProgress(({ jobId, progress }) => {
        const el = document.querySelector(`[data-job-id="${jobId}"] .fill`);
        if (el) el.style.width = `${progress}%`;
        const statusEl = document.querySelector(
          `[data-job-id="${jobId}"] .status`,
        );
        if (statusEl) statusEl.textContent = `${progress}%`;
      });

      // Setup drop zones
      function setupZone(el, type) {
        // Drag events
        el.addEventListener("dragover", (e) => {
          e.preventDefault();
          el.classList.add("dragover");
        });
        el.addEventListener("dragleave", () => el.classList.remove("dragover"));
        el.addEventListener("drop", async (e) => {
          e.preventDefault();
          el.classList.remove("dragover");
          const droppedFiles = [...e.dataTransfer.files];
          for (const f of droppedFiles) {
            const droppedPath = window.api.getPathForFile(f);
            const videoPaths = await window.api.scanPath(droppedPath);
            videoPaths.forEach((vp) => addJob(vp, vp.split("/").pop(), type));
          }
        });

        // Click to open file dialog
        el.addEventListener("click", () => {
          const input = document.createElement("input");
          input.type = "file";
          input.multiple = true;
          input.accept = "video/*";
          input.setAttribute("webkitdirectory", "");
          input.removeAttribute("webkitdirectory");
          // Two buttons: let user pick files or folder
          input.onchange = async () => {
            for (const f of [...input.files]) {
              const filePath = window.api.getPathForFile(f);
              const videoPaths = await window.api.scanPath(filePath);
              videoPaths.forEach((vp) => addJob(vp, vp.split("/").pop(), type));
            }
          };
          input.click();
        });

        // Keyboard accessibility
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            el.click();
          }
        });
      }

      setupZone(document.getElementById("zoneHeavy"), "heavy");
      setupZone(document.getElementById("zoneStandard"), "standard");
      setupZone(document.getElementById("zoneWhatsapp"), "whatsapp");

      function addJob(filePath, fileName, type) {
        const jobId = ++jobCounter;
        const job = { id: jobId, filePath, fileName, type, status: "pending" };
        queue.push(job);
        renderQueue();
        processNext();
      }

      function renderQueue() {
        queueEl.innerHTML = "";
        queue.forEach((job) => {
          const div = document.createElement("div");
          div.className = `job ${job.type}`;
          div.setAttribute("data-job-id", job.id);
          div.setAttribute("role", "listitem");

          const badge =
            job.type === "heavy"
              ? t("badge.heavy")
              : job.type === "whatsapp"
                ? t("badge.whatsapp")
                : t("badge.standard");
          let statusText = t("status.waiting");
          let statusClass = "";
          if (job.status === "processing") {
            statusText = "0%";
            statusClass = "processing";
          }
          if (job.status === "done") {
            statusText = t("status.done");
            statusClass = "done";
          }
          if (job.status === "error") {
            statusText = t("status.error");
            statusClass = "error";
          }
          if (job.status === "cancelled") {
            statusText = t("status.cancelled");
            statusClass = "cancelled";
          }

          const cancelBtn =
            job.status === "processing"
              ? `<button class="cancel-btn" onclick="cancelJob(${job.id})" aria-label="${t("cancel.aria")}">✕</button>`
              : "";

          const revealLabel =
            window.api?.platform === "win32"
              ? t("reveal.win")
              : t("reveal.mac");
          div.innerHTML = `
          <span class="badge">${badge}</span>
          <span class="filename" role="button" tabindex="0" title="${revealLabel}" onclick="revealJob(${job.id})">${job.fileName}</span>
          <div class="job-actions">
            <span class="status ${statusClass}">${statusText}</span>
            ${cancelBtn}
          </div>
          <div class="progress-bar"><div class="fill"></div></div>
        `;

          if (job.status === "done") div.classList.add("done");
          queueEl.appendChild(div);
        });
      }

      function clearQueue() {
        const processingJob = queue.find((j) => j.status === "processing");
        queue.length = 0;
        if (processingJob) queue.push(processingJob);
        renderQueue();
      }

      async function cancelJob(jobId) {
        const job = queue.find((j) => j.id === jobId);
        if (job) job.status = "cancelled";
        renderQueue();
        await window.api.cancelJob();
      }

      function revealJob(id) {
        const job = queue.find((x) => x.id === id);
        if (!job) return;
        const target =
          job.status === "done" && job.outputPath
            ? job.outputPath
            : job.filePath;
        window.api.revealInFolder(target);
      }

      async function processNext() {
        if (processing) return;
        const job = queue.find((j) => j.status === "pending");
        if (!job) return;

        processing = true;
        job.status = "processing";
        renderQueue();

        try {
          let outputPath;
          if (job.type === "heavy") {
            const maxSec = parseInt(maxDurationInput.value) || 6;
            const includeAudio = document.getElementById("heavyAudio").checked;
            const genThumb = document.getElementById("heavyThumb").checked;
            outputPath = await window.api.compressHeavy(
              job.filePath,
              maxSec,
              includeAudio,
              genThumb,
              job.id,
            );
          } else if (job.type === "whatsapp") {
            const maxHeight =
              parseInt(document.getElementById("whatsappRes").value) || 1080;
            const includeAudio =
              document.getElementById("whatsappAudio").checked;
            outputPath = await window.api.compressWhatsapp(
              job.filePath,
              maxHeight,
              includeAudio,
              false,
              job.id,
            );
          } else {
            const genThumb = document.getElementById("standardThumb").checked;
            outputPath = await window.api.compressStandard(
              job.filePath,
              genThumb,
              job.id,
            );
          }
          job.outputPath = outputPath;
          job.status = "done";
        } catch (err) {
          if (job.status !== "cancelled") job.status = "error";
          console.error(`Job ${job.id} failed:`, err);
        }

        processing = false;
        renderQueue();
        processNext();
      }
    </script>
  </body>
</html>
